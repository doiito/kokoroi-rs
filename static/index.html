<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS - 语音合成演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #1a1a1a; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: #4a90d9; }
        .controls {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        select, input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            padding: 10px 24px;
            background: #4a90d9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status {
            margin-top: 12px;
            padding: 12px;
            border-radius: 6px;
        }
        .status.info { background: #e8f4fd; color: #1a6ba0; }
        .status.error { background: #fde8e8; color: #a01a1a; }
        .status.success { background: #e8fde8; color: #1a7a1a; }
        audio { width: 100%; margin-top: 16px; }
        .label { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 6px; }
        .voice-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
        .voice-btn {
            padding: 6px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
        }
        .voice-btn:hover { border-color: #4a90d9; }
        .voice-btn.active { background: #4a90d9; color: white; border-color: #4a90d9; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎤 Kokoro TTS 语音合成</h1>

    <div class="card">
        <div class="label">选择语音</div>
        <div class="voice-grid" id="voiceGrid"></div>
    </div>

    <div class="card">
        <div class="label">输入文本</div>
        <textarea id="textInput" placeholder="请输入要合成的文本...">你好，欢迎使用Kokoro语音合成系统。今天天气很好，适合出去走走。</textarea>
        <div class="controls">
            <select id="formatSelect">
                <option value="wav">WAV</option>
                <option value="mp3">MP3</option>
            </select>
            <label>
                语速:
                <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0">
                <span id="speedLabel">1.0</span>
            </label>
            <button id="generateBtn">生成语音</button>
        </div>
        <div id="status" class="status info">准备就绪</div>
        <audio id="audioPlayer" controls style="display:none"></audio>
    </div>
</div>

<script>
const VOICES = [
    'af_alloy', 'af_aoede', 'af_bella', 'af_heart', 'af_jessica', 'af_kore',
    'af_nicole', 'af_nova', 'af_river', 'af_sarah', 'af_sky',
    'am_adam', 'am_echo', 'am_eric', 'am_fenrir', 'am_liam', 'am_michael',
    'am_onyx', 'am_puck', 'am_santa', 'bf_alice', 'bf_emma', 'bf_isabella',
    'bf_lily', 'bm_daniel', 'bm_fable', 'bm_george', 'bm_lewis',
    'ef_dora', 'em_alex', 'em_santa', 'ff_siwis',
    'hf_alpha', 'hf_beta', 'hm_omega', 'hm_psi',
    'if_sara', 'im_nicola',
    'jf_alpha', 'jf_gongitsune', 'jf_nezumi', 'jf_tebukuro', 'jm_kumo',
    'pf_dora', 'pm_alex', 'pm_santa',
    'zf_xiaobei', 'zf_xiaoni', 'zf_xiaoxiao', 'zf_xiaoyi',
    'zm_yunjian', 'zm_yunxi', 'zm_yunxia', 'zm_yunyang'
];

let selectedVoice = 'zf_xiaobei';

const voiceGrid = document.getElementById('voiceGrid');
VOICES.forEach(voice => {
    const btn = document.createElement('button');
    btn.className = 'voice-btn' + (voice === selectedVoice ? ' active' : '');
    btn.textContent = voice;
    btn.onclick = () => {
        document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedVoice = voice;
    };
    voiceGrid.appendChild(btn);
});

const textInput = document.getElementById('textInput');
const formatSelect = document.getElementById('formatSelect');
const speedRange = document.getElementById('speedRange');
const speedLabel = document.getElementById('speedLabel');
const generateBtn = document.getElementById('generateBtn');
const status = document.getElementById('status');
const audioPlayer = document.getElementById('audioPlayer');

speedRange.addEventListener('input', () => {
    speedLabel.textContent = speedRange.value;
});

generateBtn.addEventListener('click', async () => {
    const text = textInput.value.trim();
    if (!text) {
        setStatus('请输入文本', 'error');
        return;
    }

    generateBtn.disabled = true;
    setStatus('正在生成语音...', 'info');
    audioPlayer.style.display = 'none';

    try {
        const resp = await fetch('/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                text,
                voice: selectedVoice,
                speed: parseFloat(speedRange.value)
            })
        });

        const data = await resp.json();
        if (data.success) {
            const audioData = base64ToArrayBuffer(data.audio_base64);
            const blob = new Blob([audioData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            audioPlayer.src = url;
            audioPlayer.style.display = 'block';
            audioPlayer.play();
            setStatus(`生成成功 (${data.duration.toFixed(1)}秒)`, 'success');
        } else {
            setStatus('生成失败: ' + data.message, 'error');
        }
    } catch (err) {
        setStatus('请求失败: ' + err.message, 'error');
    } finally {
        generateBtn.disabled = false;
    }
});

function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
}

function setStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status ' + type;
}
</script>
</body>
</html>
