<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS - WASM G2P + ONNX Runtime Web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; padding: 20px; color: #fff;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05);
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden; backdrop-filter: blur(10px);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .content { padding: 30px; }
        .status-bar {
            padding: 15px; border-radius: 10px; margin-bottom: 20px;
            text-align: center; font-weight: 500;
        }
        .status-bar.loading { background: rgba(255,193,7,0.2); color: #ffc107; border: 1px solid #ffc107; }
        .status-bar.ready { background: rgba(40,167,69,0.2); color: #28a745; border: 1px solid #28a745; }
        .status-bar.error { background: rgba(220,53,69,0.2); color: #dc3545; border: 1px solid #dc3545; }
        .input-section { margin-bottom: 30px; }
        .input-section label { display: block; font-weight: 600; margin-bottom: 10px; color: #fff; }
        textarea {
            width: 100%; height: 120px; padding: 15px;
            border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
            font-size: 16px; resize: vertical; background: rgba(255,255,255,0.1);
            color: #fff;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .control-group { display: flex; flex-direction: column; }
        .control-group label { font-weight: 600; margin-bottom: 5px; color: rgba(255,255,255,0.8); }
        select, input[type="number"] {
            padding: 10px; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; font-size: 14px; background: rgba(255,255,255,0.1);
            color: #fff;
        }
        select option { background: #1a1a2e; color: #fff; }
        .buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        button {
            flex: 1; min-width: 150px; padding: 15px 30px;
            font-size: 16px; font-weight: 600; border: none;
            border-radius: 10px; cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #synthesizeBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        #downloadBtn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .progress-container { margin: 20px 0; }
        .progress-bar {
            width: 100%; height: 20px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        .progress-text { text-align: center; margin-top: 10px; color: rgba(255,255,255,0.7); }
        .result { display: none; margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .result.active { display: block; }
        audio { width: 100%; margin: 15px 0; }
        .info-box {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;
            margin: 10px 0; font-family: monospace; font-size: 13px; color: rgba(255,255,255,0.9);
        }
        .info-box p { margin: 5px 0; }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kokoro TTS</h1>
            <p>Rust WASM G2P + ONNX Runtime Web</p>
        </div>
        
        <div class="content">
            <div id="statusBar" class="status-bar loading">
                <span class="loading-spinner"></span> 正在加载 WASM G2P 模块...
            </div>
            
            <div class="input-section">
                <label for="inputText">输入中文文本：</label>
                <textarea id="inputText" placeholder="请输入中文文本">银行里有很多重要的事情。今天天气很好，适合出去走走。</textarea>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="voiceSelect">选择语音风格：</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="control-group">
                    <label for="speedInput">语速：</label>
                    <input type="number" id="speedInput" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <div class="control-group">
                    <label for="modelSelect">ONNX 模型：</label>
                    <select id="modelSelect">
                        <option value="kokoro-v1.1-zh-m.onnx">v1.1-zh M (int8, ~79MB)</option>
                        <option value="kokoro-v1.1-zh-s.onnx">v1.1-zh S (int4, ~47MB)</option>
                        <option value="kokoro-v1.1-zh-l.onnx">v1.1-zh L (fp32, ~311MB)</option>
                    </select>
                </div>
            </div>
            
            <div class="buttons">
                <button id="synthesizeBtn" disabled>
                    生成语音
                </button>
                <button id="downloadBtn" disabled>
                    下载 WAV
                </button>
            </div>
            
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>
            
            <div class="result" id="result">
                <h3>播放结果</h3>
                <audio id="audioPlayer" controls></audio>
                <div class="info-box" id="infoBox"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
    <script type="module">
        import init, { KokoroWASM } from './wasm-pkg/kokoros.js';
        
        let kokoroG2P = null;
        let session = null;
        let voices = {};
        let voiceStyles = {};
        let currentAudioBlob = null;
        
        const SAMPLE_RATE = 24000;
        const STYLE_DIM = 256;
        const MODEL_DIR = './models/onnx';
        const VOICES_DIR = './models/voices';
        
        function updateStatus(message, type = 'loading') {
            const bar = document.getElementById('statusBar');
            bar.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span> ${message}` : message;
            bar.className = `status-bar ${type}`;
        }
        
        function showProgress(show, percent = 0, text = '') {
            document.getElementById('progressContainer').style.display = show ? 'block' : 'none';
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = text;
        }
        
        async function loadVoices() {
            try {
                const response = await fetch(`${VOICES_DIR}/voices.json`);
                const voiceList = await response.json();
                const select = document.getElementById('voiceSelect');
                select.innerHTML = '';
                for (const [id, voice] of Object.entries(voiceList)) {
                    voices[id] = voice;
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = `${voice.name || id} (${voice.gender || 'unknown'})`;
                    select.appendChild(option);
                }
            } catch (e) {
                console.warn('Failed to load voices.json:', e);
                const select = document.getElementById('voiceSelect');
                const defaults = [
                    { id: 'zf_001', name: '中文女声', file: 'zf_001.bin' },
                ];
                for (const v of defaults) {
                    const option = document.createElement('option');
                    option.value = v.id;
                    option.textContent = v.name;
                    select.appendChild(option);
                    voices[v.id] = { name: v.name, file: v.file };
                }
            }
        }
        
        async function loadVoiceStyle(voiceId) {
            if (voiceStyles[voiceId]) return voiceStyles[voiceId];
            const info = voices[voiceId];
            if (!info || !info.file) return new Float32Array(510 * STYLE_DIM).fill(0.1);
            try {
                const response = await fetch(`${VOICES_DIR}/${info.file}`);
                const buf = await response.arrayBuffer();
                const style = new Float32Array(buf);
                voiceStyles[voiceId] = style;
                return style;
            } catch (e) {
                console.warn('Failed to load voice style:', e);
                return new Float32Array(510 * STYLE_DIM).fill(0.1);
            }
        }
        
        async function loadModel(selectedModel) {
            updateStatus(`正在加载 ONNX 模型 (${selectedModel})...`, 'loading');
            showProgress(true, 10, '正在下载模型...');
            try {
                const modelUrl = `${MODEL_DIR}/${selectedModel}`;
                const newSession = await ort.InferenceSession.create(modelUrl, {
                    executionProviders: ['wasm'],
                    graphOptimizationLevel: 'all'
                });
                session = newSession;
                showProgress(true, 100, '模型加载完成！');
                updateStatus('模型已就绪，可以开始合成', 'ready');
                document.getElementById('synthesizeBtn').disabled = false;
                setTimeout(() => showProgress(false), 500);
            } catch (error) {
                console.error('Failed to load model:', error);
                updateStatus(`模型加载失败: ${error.message}`, 'error');
                showProgress(false);
            }
        }

        async function initApp() {
            try {
                updateStatus('正在加载 WASM G2P 模块...', 'loading');
                await init();
                kokoroG2P = new KokoroWASM({ usePolyphonic: true });
                updateStatus('WASM G2P 已就绪，正在加载语音...', 'loading');
                
                await loadVoices();
                
                const modelFile = document.getElementById('modelSelect').value;
                await loadModel(modelFile);
                
            } catch (error) {
                console.error('Failed to initialize:', error);
                updateStatus(`初始化失败: ${error.message}`, 'error');
                showProgress(false);
            }
        }
        
        document.getElementById('modelSelect').addEventListener('change', async (e) => {
            document.getElementById('synthesizeBtn').disabled = true;
            await loadModel(e.target.value);
        });
        
        async function synthesize() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) { alert('请输入文本'); return; }
            if (!kokoroG2P || !session) { alert('模型未加载'); return; }
            
            const speed = parseFloat(document.getElementById('speedInput').value) || 1.0;
            const voiceId = document.getElementById('voiceSelect').value;
            
            document.getElementById('synthesizeBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('result').classList.add('active');
            
            try {
                showProgress(true, 5, '正在加载语音风格...');
                const styleData = await loadVoiceStyle(voiceId);
                
                showProgress(true, 15, '正在进行音素化处理...');
                const phonemes = kokoroG2P.phonemizeBopomofo(text, 'zh');
                const tokenIds = kokoroG2P.tokenizeV11(phonemes);
                let tokens = Array.from(tokenIds);
                const MAX_TOKENS = 508;
                if (tokens.length > MAX_TOKENS) tokens = tokens.slice(0, MAX_TOKENS);
                if (tokens.length === 0) throw new Error('No tokens generated');
                
                showProgress(true, 30, '准备推理输入...');
                const numTokens = Math.min(Math.max(tokens.length, 0), 509);
                const styleOffset = numTokens * STYLE_DIM;
                const style = styleData.slice(styleOffset, styleOffset + STYLE_DIM);
                const paddedTokens = [0, ...tokens, 0];
                
                const inputIdsTensor = new ort.Tensor('int64', BigInt64Array.from(paddedTokens.map(BigInt)), [1, paddedTokens.length]);
                const styleTensor = new ort.Tensor('float32', Float32Array.from(style), [1, STYLE_DIM]);
                const speedTensor = new ort.Tensor('float32', new Float32Array([speed]), [1]);
                
                showProgress(true, 50, '正在运行模型推理...');
                const feeds = {
                    input_ids: inputIdsTensor,
                    style: styleTensor,
                    speed: speedTensor
                };
                const results = await session.run(feeds);
                let audioData = results['waveform'].data;
                
                // Remove DC offset only — keep raw float32 values unchanged
                let sum = 0;
                for (let i = 0; i < audioData.length; i++) sum += audioData[i];
                const mean = sum / audioData.length;
                for (let i = 0; i < audioData.length; i++) audioData[i] -= mean;
                
                showProgress(true, 80, '正在生成音频文件...');
                
                // Output as 32-bit float WAV (IEEE float, format 3) — matches reference
                const wavBuffer = float32ToWav(audioData, SAMPLE_RATE);
                currentAudioBlob = new Blob([wavBuffer], { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(currentAudioBlob);
                
                const audioPlayer = document.getElementById('audioPlayer');
                audioPlayer.src = audioUrl;
                
                const duration = audioData.length / SAMPLE_RATE;
                document.getElementById('infoBox').innerHTML = `
                    <p><strong>原文：</strong>${text}</p>
                    <p><strong>音素：</strong>${phonemes}</p>
                    <p><strong>音频时长：</strong>${duration.toFixed(2)} 秒</p>
                    <p><strong>推理引擎：</strong>ORT Web (WASM) + Rust G2P</p>
                `;
                
                showProgress(true, 100, '完成！');
                document.getElementById('downloadBtn').disabled = false;
                setTimeout(() => showProgress(false), 1000);
                
            } catch (error) {
                console.error('Synthesis failed:', error);
                alert(`合成失败: ${error.message}`);
                showProgress(false);
            } finally {
                document.getElementById('synthesizeBtn').disabled = false;
            }
        }
        
        function float32ToWav(samples, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 32;
            const numSamples = samples.length;
            const dataSize = numSamples * numChannels * (bitsPerSample / 8);
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            function writeString(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 3, true);  // 3 = IEEE float (not 1 = PCM)
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * (bitsPerSample / 8), true);
            view.setUint16(32, numChannels * (bitsPerSample / 8), true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);
            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                let s = samples[i];
                if (isNaN(s) || !isFinite(s)) s = 0;
                view.setFloat32(offset, s, true);  // raw float32
                offset += 4;
            }
            return buffer;
        }
        
        document.getElementById('synthesizeBtn').addEventListener('click', synthesize);
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!currentAudioBlob) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(currentAudioBlob);
            a.download = `kokoro_${Date.now()}.wav`;
            a.click();
            URL.revokeObjectURL(a.href);
        });
        
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
