<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS - 纯 Rust WASM (oxionnx)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: white;
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content { padding: 30px; }
        .status-bar {
            padding: 10px; border-radius: 5px; margin-bottom: 20px;
            text-align: center; font-weight: 500;
        }
        .status-bar.loading { background: #fff3cd; color: #856404; }
        .status-bar.ready { background: #d4edda; color: #155724; }
        .status-bar.error { background: #f8d7da; color: #721c24; }
        .input-section { margin-bottom: 30px; }
        .input-section label {
            display: block; font-weight: 600; margin-bottom: 10px; color: #333;
        }
        textarea {
            width: 100%; height: 100px; padding: 15px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 16px; resize: vertical;
        }
        .controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .control-group { display: flex; flex-direction: column; }
        .control-group label {
            font-weight: 600; margin-bottom: 5px; color: #555;
        }
        select, input[type="number"] {
            padding: 10px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 14px;
        }
        .buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        button {
            flex: 1; min-width: 150px; padding: 15px 30px;
            font-size: 16px; font-weight: 600; border: none;
            border-radius: 10px; cursor: pointer;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            display: none; margin-top: 30px; padding: 20px;
            background: #f8f9fa; border-radius: 10px;
        }
        .result.active { display: block; }
        .info-box {
            background: #fff; padding: 15px; border-radius: 8px;
            margin: 10px 0; border: 1px solid #e0e0e0;
            font-family: monospace; font-size: 13px;
        }
        .progress-container { margin: 20px 0; }
        .progress-bar {
            width: 100%; height: 20px; background: #e0e0e0;
            border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        .progress-text { text-align: center; margin-top: 10px; color: #555; }
        audio { width: 100%; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Kokoro TTS</h1>
            <p>纯 Rust WASM + oxionnx 推理引擎</p>
        </div>
        
        <div class="content">
            <div id="statusBar" class="status-bar loading">
                ⏳ 正在加载 WASM 模块...
            </div>
            
            <div class="input-section">
                <label for="inputText">输入中文文本：</label>
                <textarea id="inputText">银行里有很多重要的事情。今天天气很好，适合出去走走。</textarea>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="voiceSelect">选择语音风格：</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="control-group">
                    <label for="speedInput">语速：</label>
                    <input type="number" id="speedInput" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <div class="control-group">
                    <label for="modelSelect">ONNX 模型：</label>
                    <select id="modelSelect">
                        <option value="model_fp16.onnx">fp16 (157MB, 推荐)</option>
                        <option value="model_int8.onnx">int8 (122MB)</option>
                        <option value="model_q8f16.onnx">q8f16 (83MB, 量化)</option>
                    </select>
                </div>
            </div>
            
            <div class="buttons">
                <button id="synthesizeBtn" disabled>
                    🎵 生成语音（纯 Rust WASM）
                </button>
            </div>
            
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
            </div>
            
            <div class="result" id="result">
                <h3>🔊 播放结果</h3>
                <audio id="audioPlayer" controls></audio>
                <div class="info-box" id="infoBox"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { KokoroWASM, pcm_samples_to_wav_data } from './wasm-pkg/kokoros.js';
        
        let kokoro = null;
        let currentAudioBlob = null;
        let voices = {};
        let voiceEmbeddings = {};
        const SAMPLE_RATE = 24000;
        
        function updateStatus(message, type = 'loading') {
            const bar = document.getElementById('statusBar');
            bar.textContent = message;
            bar.className = `status-bar ${type}`;
        }
        
        function showProgress(show, percent = 0, text = '') {
            document.getElementById('progressContainer').style.display = show ? 'block' : 'none';
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = text;
        }
        
        async function loadVoices() {
            try {
                const response = await fetch('./models/voices/voices.json');
                const voiceList = await response.json();
                
                const select = document.getElementById('voiceSelect');
                select.innerHTML = '';
                
                for (const [id, voice] of Object.entries(voiceList)) {
                    voices[id] = voice;
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = `${voice.name || id} (${voice.gender || 'unknown'})`;
                    select.appendChild(option);
                }
            } catch (e) {
                console.warn('Failed to load voices.json:', e);
                const select = document.getElementById('voiceSelect');
                const defaultVoices = [
                    { id: 'zf_001', name: '中文女声 001', file: 'zf_001.bin' },
                ];
                for (const v of defaultVoices) {
                    const option = document.createElement('option');
                    option.value = v.id;
                    option.textContent = v.name;
                    select.appendChild(option);
                    voices[v.id] = { name: v.name, file: v.file };
                }
            }
        }
        
        async function loadVoiceEmbedding(voiceId) {
            if (voiceEmbeddings[voiceId]) {
                return voiceEmbeddings[voiceId];
            }
            
            const voiceInfo = voices[voiceId];
            if (!voiceInfo || !voiceInfo.file) {
                return new Float32Array(256).fill(0.1);
            }
            
            try {
                const response = await fetch(`./models/voices/${voiceInfo.file}`);
                const arrayBuffer = await response.arrayBuffer();
                const embedding = new Float32Array(arrayBuffer);
                voiceEmbeddings[voiceId] = embedding;
                return embedding;
            } catch (e) {
                console.warn('Failed to load voice embedding:', e);
                return new Float32Array(256).fill(0.1);
            }
        }
        
        async function loadModel() {
            const modelFile = document.getElementById('modelSelect').value;
            const modelSize = modelFile.includes('q8f16') ? '83MB' : modelFile.includes('int8') ? '122MB' : '157MB';
            
            updateStatus(`⏳ 正在加载 ONNX 模型 (${modelFile}, 约 ${modelSize})...`, 'loading');
            showProgress(true, 10, '正在下载 ONNX 模型...');
            
            try {
                const response = await fetch(`./models/onnx/${modelFile}`);
                const contentLength = response.headers.get('content-length');
                const total = parseInt(contentLength, 10);
                let loaded = 0;
                
                const reader = response.body.getReader();
                const chunks = [];
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    loaded += value.length;
                    const percent = Math.round((loaded / total) * 70) + 10;
                    showProgress(true, percent, `下载中... ${Math.round(loaded / 1024 / 1024)}MB / ${Math.round(total / 1024 / 1024)}MB`);
                }
                
                showProgress(true, 85, '正在解析模型 (oxionnx)...');
                
                const modelBytes = new Uint8Array(loaded);
                let offset = 0;
                for (const chunk of chunks) {
                    modelBytes.set(chunk, offset);
                    offset += chunk.length;
                }
                
                showProgress(true, 90, '正在初始化推理引擎...');
                
                kokoro.loadModel(modelBytes);
                
                showProgress(true, 100, '模型加载完成！');
                updateStatus('✅ 纯 Rust WASM + oxionnx 模型已就绪', 'ready');
                document.getElementById('synthesizeBtn').disabled = false;
                
                setTimeout(() => showProgress(false), 1000);
                
            } catch (error) {
                console.error('Failed to load model:', error);
                updateStatus(`❌ 模型加载失败: ${error.message}`, 'error');
                showProgress(false);
            }
        }
        
        async function initWasm() {
            try {
                await init();
                kokoro = new KokoroWASM({ usePolyphonic: true });
                
                updateStatus('✅ WASM 模块已加载，正在加载语音风格...', 'loading');
                await loadVoices();
                
                updateStatus('✅ 语音风格已加载，正在加载 ONNX 模型...', 'loading');
                await loadModel();
                
                const defaultVoiceId = document.getElementById('voiceSelect').value;
                if (defaultVoiceId) {
                    await loadVoiceEmbedding(defaultVoiceId);
                }
                
            } catch (error) {
                console.error('Failed to initialize:', error);
                updateStatus(`❌ 初始化失败: ${error.message}`, 'error');
            }
        }
        
        async function synthesize() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                alert('请输入文本');
                return;
            }
            
            if (!kokoro || !kokoro.isModelLoaded()) {
                alert('模型未加载');
                return;
            }
            
            const speed = parseFloat(document.getElementById('speedInput').value) || 1.0;
            const voiceId = document.getElementById('voiceSelect').value;
            
            showProgress(true, 10, '正在加载语音风格...');
            
            try {
                const style = await loadVoiceEmbedding(voiceId);
                
                showProgress(true, 20, '正在进行音素化处理...');
                
                const result = kokoro.synthesize(text, style, speed);
                
                showProgress(true, 80, '正在生成音频文件...');
                
                const audioData = result.audio;
                const wavData = pcm_samples_to_wav_data(audioData);
                currentAudioBlob = new Blob([wavData], { type: 'audio/wav' });
                
                const audioUrl = URL.createObjectURL(currentAudioBlob);
                const audioPlayer = document.getElementById('audioPlayer');
                audioPlayer.src = audioUrl;
                
                document.getElementById('result').classList.add('active');
                
                const duration = audioData.length / SAMPLE_RATE;
                document.getElementById('infoBox').innerHTML = `
                    <p><strong>原文：</strong>${text}</p>
                    <p><strong>音素：</strong>${result.phonemesDisplay}</p>
                    <p><strong>采样率：</strong>${SAMPLE_RATE} Hz</p>
                    <p><strong>音频时长：</strong>${duration.toFixed(2)} 秒</p>
                    <p><strong>推理引擎：</strong>oxionnx (纯 Rust WASM)</p>
                `;
                
                showProgress(true, 100, '完成！');
                setTimeout(() => showProgress(false), 500);
                
                audioPlayer.play();
                
            } catch (error) {
                console.error('Synthesis failed:', error);
                alert(`合成失败: ${error.message || error}`);
                showProgress(false);
            }
        }
        
        document.getElementById('synthesizeBtn').addEventListener('click', synthesize);
        window.addEventListener('load', initWasm);
    </script>
</body>
</html>
