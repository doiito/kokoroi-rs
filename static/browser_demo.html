<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kokoro TTS - 流式语音合成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; padding: 20px; color: #fff;
        }
        .container {
            max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05);
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden; backdrop-filter: blur(10px);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 30px; text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .content { padding: 30px; }
        .status-bar {
            padding: 15px; border-radius: 10px; margin-bottom: 20px;
            text-align: center; font-weight: 500;
        }
        .status-bar.loading { background: rgba(255,193,7,0.2); color: #ffc107; border: 1px solid #ffc107; }
        .status-bar.ready { background: rgba(40,167,69,0.2); color: #28a745; border: 1px solid #28a745; }
        .status-bar.error { background: rgba(220,53,69,0.2); color: #dc3545; border: 1px solid #dc3545; }
        .input-section { margin-bottom: 30px; }
        .input-section label { display: block; font-weight: 600; margin-bottom: 10px; color: #fff; }
        textarea {
            width: 100%; height: 150px; padding: 15px;
            border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
            font-size: 16px; resize: vertical; background: rgba(255,255,255,0.1);
            color: #fff;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        textarea::placeholder { color: rgba(255,255,255,0.5); }
        .controls {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; margin-bottom: 30px;
        }
        .control-group { display: flex; flex-direction: column; }
        .control-group label { font-weight: 600; margin-bottom: 5px; color: rgba(255,255,255,0.8); }
        select, input[type="number"] {
            padding: 10px; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; font-size: 14px; background: rgba(255,255,255,0.1);
            color: #fff;
        }
        select option { background: #1a1a2e; color: #fff; }
        .buttons { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; }
        button {
            flex: 1; min-width: 150px; padding: 15px 30px;
            font-size: 16px; font-weight: 600; border: none;
            border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #streamBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        #stopBtn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
        }
        #downloadBtn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .progress-container { margin: 20px 0; }
        .progress-bar {
            width: 100%; height: 20px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transition: width 0.3s;
        }
        .progress-text { text-align: center; margin-top: 10px; color: rgba(255,255,255,0.7); }
        .result { display: none; margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 10px; }
        .result.active { display: block; }
        .audio-player { width: 100%; margin: 15px 0; }
        .info-box {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;
            margin: 10px 0; border: 1px solid rgba(255,255,255,0.1);
            font-family: monospace; font-size: 13px; color: rgba(255,255,255,0.9);
        }
        .info-box p { margin: 5px 0; }
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .queue-status {
            display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0;
        }
        .queue-item {
            padding: 5px 10px; border-radius: 5px; font-size: 12px;
            background: rgba(255,255,255,0.1);
        }
        .queue-item.playing { background: rgba(240, 147, 251, 0.3); border: 1px solid #f093fb; }
        .queue-item.pending { background: rgba(255,255,255,0.05); }
        .queue-item.done { background: rgba(40, 167, 69, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Kokoro TTS 流式播放</h1>
            <p>Rust WASM G2P + ONNX Runtime Web</p>
        </div>
        
        <div class="content">
            <div id="statusBar" class="status-bar loading">
                <span class="loading-spinner"></span> 正在加载模型...
            </div>
            
            <div class="input-section">
                <label for="inputText">输入中文文本：</label>
                <textarea id="inputText" placeholder="请输入中文文本">银行里有很多重要的事情。今天天气很好，适合出去走走。人工智能正在改变我们的生活方式。</textarea>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="voiceSelect">选择语音风格：</label>
                    <select id="voiceSelect"></select>
                </div>
                <div class="control-group">
                    <label for="speedInput">语速：</label>
                    <input type="number" id="speedInput" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>
            
            <div class="buttons">
                <button id="streamBtn" disabled>
                    <span>📡</span> 流式播放
                </button>
                <button id="stopBtn" disabled>
                    <span>⏹️</span> 停止
                </button>
                <button id="downloadBtn" disabled>
                    <span>💾</span> 下载完整音频
                </button>
            </div>
            
            <div class="progress-container" id="progressContainer" style="display:none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">准备中...</div>
                <div class="queue-status" id="queueStatus"></div>
            </div>
            
            <div class="result" id="result">
                <h3>🔊 当前播放</h3>
                <audio id="audioPlayer" class="audio-player" controls></audio>
                <div class="info-box" id="infoBox"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
    <script type="module">
        import init, { KokoroWASM } from './wasm-pkg/kokoros.js';
        
        let kokoroG2P = null;
        let session = null;
        let voices = {};
        let voiceStyles = {};
        let isStreaming = false;
        let audioQueue = [];
        let currentAudioContext = null;
        let allAudioChunks = [];
        
        const SAMPLE_RATE = 24000;
        const STYLE_DIM = 256;
        const MODEL_DIR = './models/onnx';
        const VOICES_DIR = './models/voices';
        
        function updateStatus(message, type = 'loading') {
            const bar = document.getElementById('statusBar');
            bar.innerHTML = type === 'loading' ? `<span class="loading-spinner"></span> ${message}` : message;
            bar.className = `status-bar ${type}`;
        }
        
        function showProgress(show, percent = 0, text = '') {
            document.getElementById('progressContainer').style.display = show ? 'block' : 'none';
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').textContent = text;
        }
        
        function updateQueueStatus(currentIndex, total, status) {
            const container = document.getElementById('queueStatus');
            container.innerHTML = '';
            for (let i = 0; i < total; i++) {
                const item = document.createElement('span');
                item.className = 'queue-item';
                if (i < currentIndex) item.classList.add('done');
                else if (i === currentIndex) item.classList.add(status);
                else item.classList.add('pending');
                item.textContent = `段${i + 1}`;
                container.appendChild(item);
            }
        }
        
        async function loadVoices() {
            try {
                const response = await fetch(`${VOICES_DIR}/voices.json`);
                const voiceList = await response.json();
                const select = document.getElementById('voiceSelect');
                select.innerHTML = '';
                for (const [id, voice] of Object.entries(voiceList)) {
                    voices[id] = voice;
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = `${voice.name || id} (${voice.gender || 'unknown'})`;
                    select.appendChild(option);
                }
            } catch (e) {
                console.warn('Failed to load voices:', e);
            }
        }
        
        async function loadVoiceStyle(voiceId) {
            if (voiceStyles[voiceId]) return voiceStyles[voiceId];
            const voiceInfo = voices[voiceId];
            if (!voiceInfo || !voiceInfo.file) return new Float32Array(510 * STYLE_DIM).fill(0.1);
            try {
                const response = await fetch(`${VOICES_DIR}/${voiceInfo.file}`);
                const arrayBuffer = await response.arrayBuffer();
                const style = new Float32Array(arrayBuffer);
                voiceStyles[voiceId] = style;
                return style;
            } catch (e) {
                console.warn('Failed to load voice style:', e);
                return new Float32Array(510 * STYLE_DIM).fill(0.1);
            }
        }
        
        async function initApp() {
            try {
                updateStatus('正在加载 WASM G2P 模块...', 'loading');
                await init();
                kokoroG2P = new KokoroWASM({ usePolyphonic: true });
                updateStatus('✅ WASM G2P 已就绪，正在加载 ONNX 模型...', 'loading');
                
                await loadVoices();
                
                session = await ort.InferenceSession.create(`${MODEL_DIR}/model.onnx`, {
                    executionProviders: ['wasm'],
                    graphOptimizationLevel: 'all'
                });
                
                updateStatus('✅ 模型已就绪，可以开始流式播放', 'ready');
                document.getElementById('streamBtn').disabled = false;
                
            } catch (error) {
                console.error('Failed to initialize:', error);
                updateStatus(`❌ 初始化失败: ${error.message}`, 'error');
            }
        }
        
        function splitIntoChunks(text, maxChars = 400) {
            const chunks = [];
            const lines = text.split(/\n+/);
            for (const line of lines) {
                if (!line.trim()) continue;
                const sentences = line.split(/([。！？.!?]+)/);
                let currentChunk = '';
                for (let i = 0; i < sentences.length; i += 2) {
                    let sentence = sentences[i];
                    if (i + 1 < sentences.length) sentence += sentences[i + 1];
                    if (currentChunk.length + sentence.length <= maxChars) {
                        currentChunk += sentence;
                    } else {
                        if (currentChunk.trim()) chunks.push(currentChunk.trim());
                        if (sentence.length > maxChars) {
                            for (let j = 0; j < sentence.length; j += maxChars) {
                                chunks.push(sentence.slice(j, j + maxChars).trim());
                            }
                            currentChunk = '';
                        } else {
                            currentChunk = sentence;
                        }
                    }
                }
                if (currentChunk.trim()) chunks.push(currentChunk.trim());
            }
            return chunks.filter(c => c.length > 0);
        }
        
        function float32ToWav(samples, sampleRate) {
            const numChannels = 1;
            const bitsPerSample = 16;
            const numSamples = samples.length;
            const dataSize = numSamples * numChannels * (bitsPerSample / 8);
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);
            function writeString(offset, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
            }
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * (bitsPerSample / 8), true);
            view.setUint16(32, numChannels * (bitsPerSample / 8), true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, dataSize, true);
            let offset = 44;
            for (let i = 0; i < numSamples; i++) {
                let s = samples[i];
                if (isNaN(s) || !isFinite(s)) s = 0;
                s = Math.max(-1, Math.min(1, s));
                const pcm = s < 0 ? s * 32768 : s * 32767;
                view.setInt16(offset, pcm | 0, true);
                offset += 2;
            }
            return buffer;
        }
        
        async function synthesizeChunk(chunk, voiceId, speed) {
            const phonemes = kokoroG2P.phonemize(chunk, 'zh');
            const tokenIds = kokoroG2P.tokenize(phonemes, 'zh');
            let tokens = Array.from(tokenIds);
            const MAX_TOKENS = 508;
            if (tokens.length > MAX_TOKENS) tokens = tokens.slice(0, MAX_TOKENS);
            if (tokens.length === 0) return null;
            
            const styleData = await loadVoiceStyle(voiceId);
            const numTokens = Math.min(Math.max(tokens.length, 0), 509);
            const styleOffset = numTokens * STYLE_DIM;
            const style = styleData.slice(styleOffset, styleOffset + STYLE_DIM);
            
            const paddedTokens = [0, ...tokens, 0];
            const inputIdsTensor = new ort.Tensor('int64', BigInt64Array.from(paddedTokens.map(BigInt)), [1, paddedTokens.length]);
            const styleTensor = new ort.Tensor('float32', Float32Array.from(style), [1, STYLE_DIM]);
            const speedTensor = new ort.Tensor('float32', new Float32Array([speed]), [1]);
            
            const results = await session.run({ input_ids: inputIdsTensor, style: styleTensor, speed: speedTensor });
            return {
                audioData: results[session.outputNames[0]].data,
                text: chunk,
                phonemes: phonemes
            };
        }
        
        async function playAudioChunk(audioData) {
            if (!currentAudioContext) {
                currentAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
            }
            
            const audioBuffer = currentAudioContext.createBuffer(1, audioData.length, SAMPLE_RATE);
            const channelData = audioBuffer.getChannelData(0);
            for (let i = 0; i < audioData.length; i++) {
                channelData[i] = Math.max(-1, Math.min(1, audioData[i]));
            }
            
            return new Promise((resolve) => {
                const source = currentAudioContext.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(currentAudioContext.destination);
                source.onended = resolve;
                source.start();
            });
        }
        
        async function startStreaming() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) { alert('请输入文本'); return; }
            if (!kokoroG2P || !session) { alert('模型未加载'); return; }
            
            isStreaming = true;
            allAudioChunks = [];
            audioQueue = [];
            
            document.getElementById('streamBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('result').classList.add('active');
            
            const speed = parseFloat(document.getElementById('speedInput').value) || 1.0;
            const voiceId = document.getElementById('voiceSelect').value;
            
            showProgress(true, 0, '正在分割文本...');
            
            try {
                const chunks = splitIntoChunks(text);
                console.log(`Split into ${chunks.length} chunks`);
                
                for (let i = 0; i < chunks.length && isStreaming; i++) {
                    const progress = Math.floor(((i + 0.5) / chunks.length) * 100);
                    showProgress(true, progress, `正在合成第 ${i + 1}/${chunks.length} 段...`);
                    updateQueueStatus(i, chunks.length, 'playing');
                    
                    const result = await synthesizeChunk(chunks[i], voiceId, speed);
                    if (result && result.audioData) {
                        allAudioChunks.push(result.audioData);
                        
                        document.getElementById('infoBox').innerHTML = `
                            <p><strong>当前段落：</strong>${chunks[i].substring(0, 50)}${chunks[i].length > 50 ? '...' : ''}</p>
                            <p><strong>进度：</strong>${i + 1}/${chunks.length}</p>
                        `;
                        
                        showProgress(true, Math.floor(((i + 1) / chunks.length) * 100), `正在播放第 ${i + 1}/${chunks.length} 段...`);
                        updateQueueStatus(i, chunks.length, 'playing');
                        
                        await playAudioChunk(result.audioData);
                        
                        updateQueueStatus(i + 1, chunks.length, 'pending');
                    }
                }
                
                if (isStreaming && allAudioChunks.length > 0) {
                    const totalLength = allAudioChunks.reduce((sum, arr) => sum + arr.length, 0);
                    const mergedAudio = new Float32Array(totalLength);
                    let offset = 0;
                    for (const audioData of allAudioChunks) {
                        mergedAudio.set(audioData, offset);
                        offset += audioData.length;
                    }
                    
                    const wavBuffer = float32ToWav(mergedAudio, SAMPLE_RATE);
                    const blob = new Blob([wavBuffer], { type: 'audio/wav' });
                    const audioPlayer = document.getElementById('audioPlayer');
                    audioPlayer.src = URL.createObjectURL(blob);
                    
                    document.getElementById('downloadBtn').disabled = false;
                    showProgress(true, 100, '播放完成！');
                    
                    const duration = totalLength / SAMPLE_RATE;
                    document.getElementById('infoBox').innerHTML = `
                        <p><strong>总时长：</strong>${duration.toFixed(2)} 秒</p>
                        <p><strong>分段数：</strong>${chunks.length}</p>
                        <p><strong>状态：</strong>播放完成</p>
                    `;
                }
                
            } catch (error) {
                console.error('Streaming failed:', error);
                alert(`流式播放失败: ${error.message}`);
            } finally {
                isStreaming = false;
                document.getElementById('streamBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        }
        
        function stopStreaming() {
            isStreaming = false;
            if (currentAudioContext) {
                currentAudioContext.close();
                currentAudioContext = null;
            }
            showProgress(false);
            document.getElementById('streamBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('infoBox').innerHTML = '<p><strong>状态：</strong>已停止</p>';
        }
        
        document.getElementById('streamBtn').addEventListener('click', startStreaming);
        document.getElementById('stopBtn').addEventListener('click', stopStreaming);
        
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (allAudioChunks.length === 0) return;
            
            const totalLength = allAudioChunks.reduce((sum, arr) => sum + arr.length, 0);
            const mergedAudio = new Float32Array(totalLength);
            let offset = 0;
            for (const audioData of allAudioChunks) {
                mergedAudio.set(audioData, offset);
                offset += audioData.length;
            }
            
            const wavBuffer = float32ToWav(mergedAudio, SAMPLE_RATE);
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kokoro_stream_${Date.now()}.wav`;
            a.click();
            URL.revokeObjectURL(url);
        });
        
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
